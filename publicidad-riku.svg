<svg width="900" height="1200" viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo degradado -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="50%" stop-color="#241a3d"/>
      <stop offset="100%" stop-color="#15101f"/>
    </linearGradient>
    <!-- Degradado del titulo -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Degradado tarjeta destacada -->
    <linearGradient id="cardHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b2a6b"/>
      <stop offset="100%" stop-color="#2a1f4d"/>
    </linearGradient>
    <!-- Sombra -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="1200" fill="url(#bgGrad)"/>

  <!-- Circulos decorativos -->
  <circle cx="780" cy="120" r="160" fill="#7c3aed" opacity="0.12"/>
  <circle cx="120" cy="1050" r="200" fill="#6366f1" opacity="0.10"/>

  <!-- TITULO PRINCIPAL -->
  <text x="450" y="130" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="6">RIKU</text>
  <text x="450" y="185" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#cbd5e1" text-anchor="middle" letter-spacing="4">MODELOS DE IA AL MEJOR PRECIO</text>

  <!-- Linea separadora -->
  <rect x="300" y="215" width="300" height="3" rx="2" fill="url(#titleGrad)"/>

  <!-- TARJETA: Auto -->
  <rect x="70" y="260" width="760" height="100" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="305" font-family="Arial" font-size="34" font-weight="700" fill="#ffffff">Auto</text>
  <text x="100" y="338" font-family="Arial" font-size="20" fill="#9ca3af">Modelos seleccionados para un uso optimo</text>
  <text x="800" y="318" font-family="Arial" font-size="26" font-weight="700" fill="#a78bfa" text-anchor="end">1x</text>

  <!-- TARJETA: Claude Opus 4.8 (DESTACADA) -->
  <rect x="70" y="375" width="760" height="100" rx="18" fill="url(#cardHighlight)" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="100" y="420" font-family="Arial" font-size="34" font-weight="800" fill="#c084fc">Claude Opus 4.8</text>
  <text x="365" y="418" font-family="Arial" font-size="28" fill="#22c55e">&#10003;</text>
  <text x="100" y="453" font-family="Arial" font-size="20" fill="#cbd5e1">Vista previa experimental - ventana 1M</text>
  <text x="800" y="433" font-family="Arial" font-size="26" font-weight="700" fill="#c084fc" text-anchor="end">2.2x</text>

  <!-- TARJETA: Claude Opus 4.7 -->
  <rect x="70" y="490" width="760" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="533" font-family="Arial" font-size="32" font-weight="700" fill="#ffffff">Claude Opus 4.7</text>
  <text x="100" y="563" font-family="Arial" font-size="19" fill="#9ca3af">Vista previa experimental - ventana 1M</text>
  <text x="800" y="543" font-family="Arial" font-size="25" font-weight="700" fill="#a78bfa" text-anchor="end">2.2x</text>

  <!-- TARJETA: Claude Opus 4.6 -->
  <rect x="70" y="595" width="760" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="638" font-family="Arial" font-size="32" font-weight="700" fill="#ffffff">Claude Opus 4.6</text>
  <text x="100" y="668" font-family="Arial" font-size="19" fill="#9ca3af">El modelo Claude Opus 4.6</text>
  <text x="800" y="648" font-family="Arial" font-size="25" font-weight="700" fill="#a78bfa" text-anchor="end">2.2x</text>

  <!-- TARJETA: Soneto 4.6 -->
  <rect x="70" y="700" width="760" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="743" font-family="Arial" font-size="32" font-weight="700" fill="#ffffff">Soneto 4.6 de Claude</text>
  <text x="100" y="773" font-family="Arial" font-size="19" fill="#9ca3af">Equilibrio entre velocidad y calidad</text>
  <text x="800" y="753" font-family="Arial" font-size="25" font-weight="700" fill="#60a5fa" text-anchor="end">1.3x</text>

  <!-- TARJETA: Claude Haiku 4.5 -->
  <rect x="70" y="805" width="760" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="848" font-family="Arial" font-size="32" font-weight="700" fill="#ffffff">Claude Haiku 4.5</text>
  <text x="100" y="878" font-family="Arial" font-size="19" fill="#9ca3af">El ultimo modelo Claude Haiku - rapido</text>
  <text x="800" y="858" font-family="Arial" font-size="25" font-weight="700" fill="#34d399" text-anchor="end">0.4x</text>

  <!-- TARJETA: Deepseek v3.2 -->
  <rect x="70" y="910" width="365" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="100" y="953" font-family="Arial" font-size="28" font-weight="700" fill="#ffffff">Deepseek v3.2</text>
  <text x="100" y="980" font-family="Arial" font-size="18" fill="#9ca3af">Vista previa experimental</text>
  <text x="405" y="963" font-family="Arial" font-size="23" font-weight="700" fill="#34d399" text-anchor="end">0.25x</text>

  <!-- TARJETA: MiniMax M2.5 -->
  <rect x="465" y="910" width="365" height="90" rx="18" fill="#221a38" stroke="#3b3357" stroke-width="1.5"/>
  <text x="495" y="953" font-family="Arial" font-size="28" font-weight="700" fill="#ffffff">MiniMax M2.5</text>
  <text x="495" y="980" font-family="Arial" font-size="18" fill="#9ca3af">Economico y eficiente</text>
  <text x="800" y="963" font-family="Arial" font-size="23" font-weight="700" fill="#34d399" text-anchor="end">0.25x</text>

  <!-- LLAMADO A LA ACCION -->
  <rect x="200" y="1050" width="500" height="80" rx="40" fill="url(#titleGrad)"/>
  <text x="450" y="1102" font-family="Arial" font-size="36" font-weight="800" fill="#1a1530" text-anchor="middle" letter-spacing="2">CONTRATA AHORA</text>

  <!-- Pie -->
  <text x="450" y="1170" font-family="Arial" font-size="22" fill="#9ca3af" text-anchor="middle">www.riku.com  -  Acceso a los mejores modelos de IA</text>
</svg>
